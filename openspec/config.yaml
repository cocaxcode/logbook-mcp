schema: spec-driven

context: |
  Tech stack: TypeScript 5 (ESM) + MCP SDK + better-sqlite3 + Zod
  Architecture: Factory pattern, 1 tool per file, DB singleton (WAL)
  Testing: Vitest (63 tests), in-memory SQLite for tests
  Style: Prettier (single quotes, no semicolons, trailing commas)
  Build: tsup → ESM single entry, Node 20+
  Language: Code in English, descriptions/comments in Spanish
  Published: npm @cocaxcode/logbook-mcp v0.4.12

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Document architecture decisions with rationale
    - Include file tree for new/modified files
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns (registerXyzTool, try-catch handlers)
    - One tool per file in src/tools/
    - Zod schemas for all tool input validation
  verify:
    - Run tests (npm test) — all must pass
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas
